<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>therene — Legal</title>
  <style>
    :root{
      --bg:#0f1115; --surface:#171a21; --text:#e7e9ee; --muted:#9aa3b2;
      --accent:#5b8cff; --border:#262b36; --radius:14px;
      --space:clamp(1.25rem,1rem+2vw,2.5rem);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;}
    main{max-width:760px;margin:0 auto;padding:var(--space);}
    h1{font-size:clamp(1.6rem,1.2rem+2vw,2.4rem);margin:0 0 .25em;letter-spacing:-.02em}
    p.lead{color:var(--muted);margin:0 0 2rem}
    ul{list-style:none;padding:0;margin:0;display:grid;gap:.75rem}
    a.card{display:flex;justify-content:space-between;align-items:center;gap:1rem;
      padding:1rem 1.25rem;background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);color:var(--text);text-decoration:none;
      transition:border-color .18s ease,transform .18s ease}
    a.card:hover{border-color:var(--accent);transform:translateY(-2px)}
    a.card span.name{font-weight:600}
    a.card span.kind{color:var(--muted);font-size:.85rem}
    footer{margin-top:3rem;color:var(--muted);font-size:.85rem}
  </style>
</head>
<body>
  <main>
    <h1>therene — Legal</h1>
    <p class="lead">앱별 개인정보 처리방침 및 약관.</p>
    <ul>
      <li>
        <a class="card" href="./rtsp-camera/">
          <span class="name">RTSP Camera</span>
          <span class="kind">개인정보 처리방침 →</span>
        </a>
      </li>
      <li>
        <a class="card" href="./mini-browser-mirror/">
          <span class="name">Mini Browser Mirror</span>
          <span class="kind">개인정보 처리방침 →</span>
        </a>
      </li>
      <li>
        <a class="card" href="./flagdeck/">
          <span class="name">FlagDeck</span>
          <span class="kind">개인정보 처리방침 →</span>
        </a>
      </li>
      <!-- 새 앱 추가 시: rtsp-camera 폴더를 복제하고 위 항목을 한 줄 추가 -->
    </ul>
    <footer>© therene. 문의: support@therene.co.kr</footer>
  </main>
</body>
</html>
